name: ci

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

jobs:
  test:
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-22.04, ubuntu-24.04, macos-latest]
        go: ["1.24"]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: ${{ matrix.go }}
      - run: go vet ./...
      - run: go build ./...
      - run: go test -race ./...

  cross-build:
    runs-on: ubuntu-latest
    needs: test
    strategy:
      matrix:
        goos: [linux]
        goarch: [amd64, arm64]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: "1.24"
      - run: GOOS=${{ matrix.goos }} GOARCH=${{ matrix.goarch }} go build -o vpsguard-${{ matrix.goos }}-${{ matrix.goarch }} ./cmd/vpsguard
      - uses: actions/upload-artifact@v4
        with:
          name: vpsguard-${{ matrix.goos }}-${{ matrix.goarch }}
          path: vpsguard-${{ matrix.goos }}-${{ matrix.goarch }}

  linux-distro-smoke:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        image:
          - ubuntu:20.04
          - ubuntu:22.04
          - ubuntu:24.04
          - debian:11
          - debian:12
          - rockylinux:8
          - rockylinux:9
    container:
      image: ${{ matrix.image }}
    steps:
      - uses: actions/checkout@v4
      - run: |
          if command -v apt-get >/dev/null; then
            apt-get update
            apt-get install -y ca-certificates curl tar gzip
          elif command -v dnf >/dev/null; then
            # Rocky/Alma ship curl-minimal; --allowerasing lets dnf swap it
            # for the full curl without the conflict that breaks the job.
            dnf install -y --allowerasing ca-certificates curl tar gzip
          fi
      - uses: actions/setup-go@v5
        with:
          go-version: "1.24"
      - run: go test ./...

  release-config:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: "1.24"
      - run: GOOS=linux GOARCH=amd64 go build -o dist/vpsguard-linux-amd64 ./cmd/vpsguard
      - run: GOOS=linux GOARCH=arm64 go build -o dist/vpsguard-linux-arm64 ./cmd/vpsguard
      - run: test -f packaging/nfpm.yml
      - run: test -f docs/PRIVACY.md
