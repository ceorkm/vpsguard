name: release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write
  id-token: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: "1.24"

      - id: version
        run: echo "version=${GITHUB_REF_NAME#v}" >> "$GITHUB_OUTPUT"

      - run: mkdir -p dist
      - run: GOOS=linux GOARCH=amd64 go build -trimpath -ldflags="-s -w -X main.version=${{ steps.version.outputs.version }}" -o dist/vpsguard-linux-amd64 ./cmd/vpsguard
      - run: GOOS=linux GOARCH=arm64 go build -trimpath -ldflags="-s -w -X main.version=${{ steps.version.outputs.version }}" -o dist/vpsguard-linux-arm64 ./cmd/vpsguard

      # Build .deb and .rpm packages with nfpm.
      - name: Install nfpm
        run: |
          curl -sSL "https://github.com/goreleaser/nfpm/releases/download/v2.41.3/nfpm_2.41.3_Linux_x86_64.tar.gz" \
            | tar xz nfpm
          sudo install -m 0755 nfpm /usr/local/bin/nfpm
          sudo apt-get update
          sudo apt-get install -y gettext-base

      - name: Build .deb + .rpm (amd64 + arm64)
        env:
          VERSION: ${{ steps.version.outputs.version }}
        run: |
          # nfpm expands env vars in top-level fields (name, version, arch)
          # but not inside `contents`. Pre-render the spec per arch with envsubst.
          for arch in amd64 arm64; do
            GOARCH=$arch envsubst < packaging/nfpm.yml > /tmp/nfpm-$arch.yml
            nfpm pkg --packager deb --config /tmp/nfpm-$arch.yml --target dist/
            nfpm pkg --packager rpm --config /tmp/nfpm-$arch.yml --target dist/
          done

      - name: Generate checksums
        run: cd dist && sha256sum * > checksums.txt

      - uses: sigstore/cosign-installer@v3
      - run: cosign sign-blob --yes --bundle dist/checksums.txt.bundle dist/checksums.txt

      - uses: softprops/action-gh-release@v2
        with:
          files: |
            dist/vpsguard-linux-amd64
            dist/vpsguard-linux-arm64
            dist/*.deb
            dist/*.rpm
            dist/checksums.txt
            dist/checksums.txt.bundle
