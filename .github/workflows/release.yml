name: release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write
  id-token: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: "1.24"
      - run: mkdir -p dist
      - run: GOOS=linux GOARCH=amd64 go build -trimpath -ldflags="-s -w" -o dist/vpsguard-linux-amd64 ./cmd/vpsguard
      - run: GOOS=linux GOARCH=arm64 go build -trimpath -ldflags="-s -w" -o dist/vpsguard-linux-arm64 ./cmd/vpsguard
      - run: sha256sum dist/* > dist/checksums.txt
      - uses: sigstore/cosign-installer@v3
      - run: cosign sign-blob --yes --bundle dist/checksums.txt.bundle dist/checksums.txt
      - uses: softprops/action-gh-release@v2
        with:
          files: |
            dist/vpsguard-linux-amd64
            dist/vpsguard-linux-arm64
            dist/checksums.txt
            dist/checksums.txt.bundle
