name: release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write
  id-token: write
  pages: write

jobs:
  release:
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.version.outputs.version }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: "1.24"

      - id: version
        run: echo "version=${GITHUB_REF_NAME#v}" >> "$GITHUB_OUTPUT"

      - run: mkdir -p dist
      - run: GOOS=linux GOARCH=amd64 go build -trimpath -ldflags="-s -w -X main.version=${{ steps.version.outputs.version }}" -o dist/vpsguard-linux-amd64 ./cmd/vpsguard
      - run: GOOS=linux GOARCH=arm64 go build -trimpath -ldflags="-s -w -X main.version=${{ steps.version.outputs.version }}" -o dist/vpsguard-linux-arm64 ./cmd/vpsguard

      # Build .deb and .rpm packages with nfpm.
      - name: Install nfpm
        run: |
          curl -sSL "https://github.com/goreleaser/nfpm/releases/download/v2.41.3/nfpm_2.41.3_Linux_x86_64.tar.gz" \
            | tar xz nfpm
          sudo install -m 0755 nfpm /usr/local/bin/nfpm

      - name: Build .deb (amd64 + arm64)
        run: |
          GOARCH=amd64 VERSION=${{ steps.version.outputs.version }} nfpm pkg --packager deb --config packaging/nfpm.yml --target dist/
          GOARCH=arm64 VERSION=${{ steps.version.outputs.version }} nfpm pkg --packager deb --config packaging/nfpm.yml --target dist/

      - name: Build .rpm (amd64 + arm64)
        run: |
          GOARCH=amd64 VERSION=${{ steps.version.outputs.version }} nfpm pkg --packager rpm --config packaging/nfpm.yml --target dist/
          GOARCH=arm64 VERSION=${{ steps.version.outputs.version }} nfpm pkg --packager rpm --config packaging/nfpm.yml --target dist/

      - name: Generate checksums
        run: cd dist && sha256sum * > checksums.txt

      - uses: sigstore/cosign-installer@v3
      - run: cosign sign-blob --yes --bundle dist/checksums.txt.bundle dist/checksums.txt

      - uses: softprops/action-gh-release@v2
        with:
          files: |
            dist/vpsguard-linux-amd64
            dist/vpsguard-linux-arm64
            dist/*.deb
            dist/*.rpm
            dist/checksums.txt
            dist/checksums.txt.bundle

      # Hand off the .deb files to the apt-repo job below.
      - uses: actions/upload-artifact@v4
        with:
          name: debs
          path: dist/*.deb
          retention-days: 1

  apt-repo:
    needs: release
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          ref: gh-pages
          path: pages
        continue-on-error: true

      - name: Initialize gh-pages branch if missing
        run: |
          if [ ! -d pages/.git ]; then
            mkdir -p pages
            cd pages
            git init -b gh-pages
            git remote add origin "https://x-access-token:${{ secrets.GITHUB_TOKEN }}@github.com/${GITHUB_REPOSITORY}.git"
          fi

      - uses: actions/download-artifact@v4
        with:
          name: debs
          path: debs/

      - name: Install repo tooling
        run: sudo apt-get update && sudo apt-get install -y dpkg-dev gnupg

      - name: Import GPG signing key
        if: ${{ secrets.VPSGUARD_GPG_KEY != '' }}
        run: |
          echo "${{ secrets.VPSGUARD_GPG_KEY }}" | gpg --batch --import
          gpg --list-secret-keys --keyid-format=long

      - name: Build apt repo (debian/ubuntu, single suite)
        env:
          REPO_DIR: pages/apt
          SUITE: stable
          COMPONENT: main
        run: |
          set -eu
          mkdir -p "$REPO_DIR/dists/$SUITE/$COMPONENT/binary-amd64"
          mkdir -p "$REPO_DIR/dists/$SUITE/$COMPONENT/binary-arm64"
          mkdir -p "$REPO_DIR/pool/main"
          cp debs/*.deb "$REPO_DIR/pool/main/"

          for arch in amd64 arm64; do
            dpkg-scanpackages --multiversion --arch "$arch" "$REPO_DIR/pool/main" \
              | sed "s|$REPO_DIR/||" \
              > "$REPO_DIR/dists/$SUITE/$COMPONENT/binary-$arch/Packages"
            gzip -kf "$REPO_DIR/dists/$SUITE/$COMPONENT/binary-$arch/Packages"
          done

          cd "$REPO_DIR/dists/$SUITE"
          {
            echo "Origin: vpsguard"
            echo "Label: vpsguard"
            echo "Suite: $SUITE"
            echo "Codename: $SUITE"
            echo "Architectures: amd64 arm64"
            echo "Components: $COMPONENT"
            echo "Description: vpsguard official apt repository"
            echo "Date: $(date -Ru)"
            apt-ftparchive release . || true
          } > Release

      - name: Sign Release file
        if: ${{ secrets.VPSGUARD_GPG_KEY != '' }}
        run: |
          cd pages/apt/dists/stable
          gpg --batch --yes --default-key "$(gpg --list-secret-keys --keyid-format=long | awk '/^sec/{print $2}' | head -1 | cut -d/ -f2)" \
              --armor --detach-sign --output Release.gpg Release
          gpg --batch --yes --default-key "$(gpg --list-secret-keys --keyid-format=long | awk '/^sec/{print $2}' | head -1 | cut -d/ -f2)" \
              --armor --clearsign --output InRelease Release

      - name: Export public key
        if: ${{ secrets.VPSGUARD_GPG_KEY != '' }}
        run: |
          mkdir -p pages/apt
          gpg --armor --export > pages/apt/vpsguard.asc

      - name: Write index.html
        run: |
          cat > pages/index.html <<'HTML'
          <!doctype html>
          <html><head><meta charset="utf-8"><title>vpsguard apt repository</title></head>
          <body style="font-family:system-ui;max-width:720px;margin:2rem auto;padding:0 1rem;line-height:1.5">
          <h1>vpsguard apt repository</h1>
          <p>Install the agent on Debian or Ubuntu:</p>
          <pre><code>curl -fsSL https://ceorkm.github.io/vpsguard/apt/vpsguard.asc | sudo tee /etc/apt/keyrings/vpsguard.asc &gt; /dev/null
          echo "deb [signed-by=/etc/apt/keyrings/vpsguard.asc] https://ceorkm.github.io/vpsguard/apt stable main" | sudo tee /etc/apt/sources.list.d/vpsguard.list
          sudo apt update
          sudo apt install vpsguard
          sudo vpsguard configure</code></pre>
          <p>Source: <a href="https://github.com/ceorkm/vpsguard">github.com/ceorkm/vpsguard</a></p>
          </body></html>
          HTML

      - name: Commit and push gh-pages
        run: |
          cd pages
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git config user.name "github-actions[bot]"
          git add -A
          if git diff --cached --quiet; then
            echo "no changes"
          else
            git commit -m "publish ${{ needs.release.outputs.version }}"
            git push --force --set-upstream origin gh-pages
          fi
